version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: wagw-mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - wagw

  baileys:
    build: ./baileys-service
    container_name: wagw-baileys
    restart: unless-stopped
    environment:
      PORT: "3001"
      AUTH_DIR: /data/sessions
      WEBHOOK_URL: http://backend:8001/api/webhook/baileys
      SHARED_TOKEN: ${BAILEYS_TOKEN}
      LOG_LEVEL: info
    volumes:
      - baileys_data:/data
    networks:
      - wagw
    depends_on:
      - backend  # webhook target must be up first

  backend:
    build: ./backend
    container_name: wagw-backend
    restart: unless-stopped
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: ${DB_NAME:-wa_gateway_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_HOURS: "24"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      CORS_ORIGINS: ${CORS_ORIGINS}
      BAILEYS_URL: http://baileys:3001
      BAILEYS_TOKEN: ${BAILEYS_TOKEN}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM: ${RESEND_FROM:-WA Gateway <onboarding@resend.dev>}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL}
    networks:
      - wagw
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: ${APP_PUBLIC_URL}
    container_name: wagw-frontend
    restart: unless-stopped
    networks:
      - wagw

  nginx:
    image: nginx:alpine
    container_name: wagw-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    networks:
      - wagw
    depends_on:
      - backend
      - frontend

networks:
  wagw:

volumes:
  mongo_data:
  baileys_data:
